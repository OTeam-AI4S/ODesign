# Weights&Biases configuration for gRNAde training pipeline (main.py)
# This is a sweep template for hyperparameter tuning of the gRNAde model

program: main.py
method: grid
name: gRNAde_sweep
description: "gRNAde W&B sweep template for hyperparameter tuning"

entity: chaitjo
project: gRNAde

parameters:
  
  # Misc configurations
  device:
    value: 'gpu'
  gpu:
    value: 0
  seed:
    value: 0
  save:
    value: True

  # Data configurations
  data_path:
    value: "./data/"
  radius:
    value: 4.5
  top_k:
    value: 32
  num_rbf:
    value: 32
  num_posenc:
    value: 32
  max_num_conformers:
    value: 1
  noise_scale:
    value: 0.1
  drop_prob_3d:
    values: 
    - 0.0
    - 0.25
    - 0.5
    - 0.75
    - 1.0
  max_nodes_batch:
    value: 3000
  max_nodes_sample:
    values: 
    - 500
    - 1000
    - 2000
    - 5000

  # Splitting configurations
  split:
    value: 'das'

  # Model configurations
  model:
    value: 'gRNAde'
  node_in_dim:
    value: [15, 4]  # (num_bb_atoms x 5, 2 + num_bb_atoms - 1)
  node_h_dim:
    values: 
    - [128, 16]
    - [256, 32]
  edge_in_dim:
    value: [132, 3]  # (num_bb_atoms x num_rbf + num_posenc + num_bb_atoms, num_bb_atoms)
  edge_h_dim:
    values: 
    - [64, 4]
    - [128, 8]
  num_layers:
    values: 
    - 3
    - 4
  drop_rate:
    values:
    - 0.0 
    - 0.1
    - 0.5
  out_dim:
    value: 4

  # Training configurations
  epochs:
    value: 100
  lr:
    value: 0.0001
  label_smoothing:
    value: 0.05
  batch_size:
    value: 8
  num_workers:
    value: 16
  val_every:
    value: 10

  # Evaluation configurations
  model_path:
    value: ''
  evaluate:
    value: False
  n_samples:
    value: 16
  temperature:
    value: 0.1
